<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nitflix Clone</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar" data-topbar>
      <a class="brand" href="#" aria-label="Nitflix home">Nitflix</a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="#home">Home</a>
        <a href="#trending">Trending</a>
        <a href="#movies">Movies</a>
        <a href="#series">Series</a>
      </nav>
      <div class="top-actions">
        <label class="search">
          <span class="sr-only">Search titles</span>
          <input id="searchInput" type="search" placeholder="Search" autocomplete="off" />
        </label>
        <button class="profile-button" type="button" aria-label="Open profile menu">RK</button>
      </div>
    </header>

    <main id="home">
      <section class="hero" aria-labelledby="heroTitle">
        <div class="hero-backdrop"></div>
        <div class="hero-content">
          <p class="kicker">Nitflix Original</p>
          <h1 id="heroTitle">Stream bold stories tonight.</h1>
          <p class="hero-copy">
            Browse handpicked movies and shows in a sleek, responsive streaming interface built from scratch.
          </p>
          <div class="hero-actions">
            <button class="primary-button" type="button" data-open-featured>Play Preview</button>
            <button class="secondary-button" type="button" data-scroll-trending>More Info</button>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Browse controls">
        <div class="tabs" role="tablist" aria-label="Content categories">
          <button class="tab is-active" type="button" data-filter="all">All</button>
          <button class="tab" type="button" data-filter="movie">Movies</button>
          <button class="tab" type="button" data-filter="series">Series</button>
          <button class="tab" type="button" data-filter="new">New</button>
        </div>
        <p class="watchlist-count"><span id="watchlistCount">0</span> saved</p>
      </section>

      <section class="content-section" id="trending" aria-labelledby="trendingTitle">
        <div class="section-heading">
          <h2 id="trendingTitle">Trending Now</h2>
          <button class="text-button" type="button" data-clear-watchlist>Clear Saved</button>
        </div>
        <div class="title-row" id="trendingRow"></div>
      </section>

      <section class="content-section" id="movies" aria-labelledby="moviesTitle">
        <div class="section-heading">
          <h2 id="moviesTitle">Popular Movies</h2>
        </div>
        <div class="title-grid" id="libraryGrid"></div>
      </section>
    </main>

    <dialog class="preview-modal" id="previewModal" aria-labelledby="modalTitle">
      <button class="close-button" type="button" data-close-modal aria-label="Close preview">&times;</button>
      <img id="modalImage" src="" alt="" />
      <div class="modal-body">
        <p class="kicker" id="modalMeta"></p>
        <h2 id="modalTitle"></h2>
        <p id="modalDescription"></p>
        <div class="modal-actions">
          <button class="primary-button" type="button">Play</button>
          <button class="secondary-button" type="button" data-save-current>Save</button>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
